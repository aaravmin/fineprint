name: ci

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check formatting
        run: npx prettier --check .

      - name: Typecheck all workspaces
        run: npm run typecheck

      - name: Run tests
        run: npm test

      - name: Engine coverage gate
        run: npm run test:coverage --workspace engine

      - name: Build dashboard
        run: npm run build --workspace client
        env:
          # Placeholder build-time keys: Clerk and Supabase are runtime
          # concerns; the build only needs well-formed values.
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY || 'ci-clerk-publishable-key' }}
          CLERK_SECRET_KEY: ${{ secrets.CLERK_SECRET_KEY || 'ci-clerk-secret-key' }}
          NEXT_PUBLIC_SUPABASE_URL: http://localhost:54321
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
